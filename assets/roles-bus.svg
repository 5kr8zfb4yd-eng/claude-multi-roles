<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" font-family="ui-monospace, 'SF Mono', SFMono-Regular, Menlo, monospace">
  <defs>
    <!-- One orange Claude mascot: sunburst body with a little face -->
    <g id="claude">
      <g fill="#D97757">
        <rect x="-3" y="-46" width="6" height="20" rx="3"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(30)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(60)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(90)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(120)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(150)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(180)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(210)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(240)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(270)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(300)"/>
        <rect x="-3" y="-46" width="6" height="20" rx="3" transform="rotate(330)"/>
      </g>
      <circle r="23" fill="#E8895F"/>
      <circle r="23" fill="none" stroke="#C2613F" stroke-width="1.5"/>
      <circle cx="-8" cy="-3" r="3.2" fill="#2b1810"/>
      <circle cx="8" cy="-3" r="3.2" fill="#2b1810"/>
      <path d="M -8 7 Q 0 14 8 7" fill="none" stroke="#2b1810" stroke-width="2.4" stroke-linecap="round"/>
    </g>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D97757" opacity="0.85"/>
    </marker>
  </defs>

  <!-- terminal window -->
  <rect x="40" y="28" width="1120" height="504" rx="16" fill="#0d1117" stroke="#222b36" stroke-width="1.5"/>
  <rect x="40" y="28" width="1120" height="46" rx="16" fill="#161b22"/>
  <rect x="40" y="58" width="1120" height="16" fill="#161b22"/>
  <circle cx="68" cy="51" r="6.5" fill="#ff5f56"/>
  <circle cx="90" cy="51" r="6.5" fill="#ffbd2e"/>
  <circle cx="112" cy="51" r="6.5" fill="#27c93f"/>
  <text x="600" y="56" fill="#7d8590" font-size="15" text-anchor="middle">claude-multi-roles — async role bus</text>

  <!-- pentagon faint outline connecting the roles -->
  <polygon points="600,150 770,272 705,460 495,460 430,272" fill="none" stroke="#D97757" stroke-width="1" stroke-dasharray="2 6" opacity="0.25"/>

  <!-- spokes: each role exchanges with the central BUS (bidirectional) -->
  <g stroke="#D97757" stroke-width="1.6" stroke-dasharray="5 6" opacity="0.55" marker-start="url(#arrow)" marker-end="url(#arrow)">
    <line x1="600" y1="195" x2="600" y2="258"/>
    <line x1="735" y1="278" x2="648" y2="296"/>
    <line x1="676" y1="425" x2="624" y2="333"/>
    <line x1="524" y1="425" x2="576" y2="333"/>
    <line x1="465" y1="278" x2="552" y2="296"/>
  </g>

  <!-- central BUS hub -->
  <circle cx="600" cy="300" r="42" fill="#161b22" stroke="#D97757" stroke-width="1.6"/>
  <text x="600" y="296" fill="#D97757" font-size="15" font-weight="700" text-anchor="middle">BUS</text>
  <text x="600" y="313" fill="#7d8590" font-size="11" text-anchor="middle">.md</text>

  <!-- the five role mascots -->
  <use href="#claude" transform="translate(600,150)"/>
  <use href="#claude" transform="translate(770,272)"/>
  <use href="#claude" transform="translate(705,460)"/>
  <use href="#claude" transform="translate(495,460)"/>
  <use href="#claude" transform="translate(430,272)"/>

  <!-- role labels -->
  <g fill="#c9d1d9" font-size="14" font-weight="700" text-anchor="middle">
    <text x="600" y="86">Product</text>
    <text x="852" y="268">UI/UX</text>
    <text x="705" y="524">SWE</text>
    <text x="495" y="524">Security</text>
    <text x="348" y="268">Growth</text>
  </g>
  <g fill="#6e7681" font-size="11" text-anchor="middle">
    <text x="600" y="101">none</text>
    <text x="852" y="283">none</text>
    <text x="705" y="539">supabase</text>
    <text x="495" y="539">supabase</text>
    <text x="348" y="283">instagram</text>
  </g>
</svg>
